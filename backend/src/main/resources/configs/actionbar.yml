# https://mo-mi.gitbook.io/xiaomomi-plugins/plugin-wiki/customnameplates/config/actionbar.yml
actionbar:
  conditions:
    condition_1:
      type: permission
      refresh-interval: 20
      value:
        - actionbar.show
  text-display-order:
    1:
      duration: -1
      text: '%np_conditional_actionbar%'
      conditions: {}

# Example: actionbar that shows only when a placeholder changes, then hides after 5 seconds of inactivity.
#
# health-actionbar:
#   conditions:
#     hide-when-stable:
#       type: placeholder-change-timeout
#       refresh-interval: 20
#       value:
#         papi: "%player_health%"   # placeholder(s) to watch — can be a list
#         timeout: 5.0              # seconds of inactivity before hiding (supports decimals)
#   text-display-order:
#     1:
#       duration: -1
#       text: '❤ %player_health% / %player_max_health%'
#       conditions: {}
#
# You can also watch several placeholders at once — the actionbar stays visible as long as
# ANY of them has changed within the timeout window:
#
# combat-actionbar:
#   conditions:
#     hide-when-stable:
#       type: placeholder-change-timeout
#       refresh-interval: 10
#       value:
#         papi:
#           - "%player_health%"
#           - "%player_food_level%"
#         timeout: 8.0
#         # reset-values: values that should NOT count as an update (e.g. when a
#         # placeholder is wiped back to "" or "0" after a cooldown). Transitions
#         # TO any listed value are ignored and do not re-show the actionbar.
#         reset-values:
#           - ""
#           - "0"
#           - "0.00"
#   text-display-order:
#     1:
#       duration: -1
#       text: '❤ %player_health%  🍗 %player_food_level%'
#       conditions: {}